id: spark_test

namespace: zoomcamp

description: Process raw CSV files from Google Cloud Storage with Spark and write cleaned Parquet files to the silver layer.

tasks:
  - id: run_spark_silver
    type: io.kestra.plugin.scripts.python.Script

    containerImage: python:3.11-slim

    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      user: "root"

      memory:
        memory: "8GB"
        memoryReservation: "6GB"
        memorySwap: "8GB"

    env:
      GCP_BUCKET: "{{ kv('GCP_BUCKET_NAME') }}"
      JAVA_HOME: /usr/lib/jvm/default-java
      GOOGLE_APPLICATION_CREDENTIALS: "gcp-key.json"

    inputFiles:
      gcp-key.json: "{{ secret('GCP_SERVICE_ACCOUNT') }}"

    beforeCommands:
      - apt-get update
      - apt-get install -y default-jdk
      - pip install pyspark google-cloud-storage

    script: |
      import os
      import sys

      from pyspark.sql import SparkSession

      key_path = os.environ["GOOGLE_APPLICATION_CREDENTIALS"]
      bucket = os.environ["GCP_BUCKET"]

      tables = [
          "campaign_desc",
          "campaign_table",
          "causal_data",
          "coupon",
          "coupon_redempt",
          "hh_demographic",
          "product",
          "transaction_data"
      ]

      spark = (
          SparkSession.builder
          .appName("Dunnhumby-Silver-Processing")
          .config(
              "spark.jars.packages",
              "com.google.cloud.bigdataoss:gcs-connector:hadoop3-2.2.15"
          )
          .config(
              "spark.hadoop.fs.gs.impl",
              "com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem"
          )
          .config(
              "spark.hadoop.fs.AbstractFileSystem.gs.impl",
              "com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS"
          )
          .config(
              "spark.hadoop.google.cloud.auth.service.account.enable",
              "true"
          )
          .config(
              "spark.hadoop.google.cloud.auth.service.account.json.keyfile",
              key_path
          )
          .config("spark.driver.memory", "6g")
          .config("spark.executor.memory", "6g")
          .config("spark.sql.shuffle.partitions", "4")
          .getOrCreate()
      )

      print("--- Spark session started ---")

      failed_tables = []

      for table in tables:
          try:
              print(f"--- Processing table: {table} ---")

              input_path = f"gs://{bucket}/bronze/{table}.csv"
              output_path = f"gs://{bucket}/silver/{table}"

              df = (
                  spark.read
                  .option("header", "true")
                  .option("inferSchema", "true")
                  .csv(input_path)
              )

              df_clean = (
                  df.dropna(how="all")
                    .dropDuplicates()
              )

              (
                  df_clean.write
                  .mode("overwrite")
                  .parquet(output_path)
              )

              print(f"Completed table: {table}")

              spark.catalog.clearCache()

          except Exception as e:
              print(f"Failed table {table}: {str(e)}")
              failed_tables.append(table)

      spark.stop()

      if failed_tables:
          raise RuntimeError(
              f"Processing failed for tables: {', '.join(failed_tables)}"
          )

      print("--- Processing completed successfully ---")